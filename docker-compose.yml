version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pg_agent_demo
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pg_agent_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pg_agent_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
